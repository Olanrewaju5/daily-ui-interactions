<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d0a1f" />
<title>Achievement Unlocked — GSAP · Day 8</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  * { box-sizing:border-box; }
  html, body { height:100%; margin:0; }
  body {
    background:radial-gradient(120% 90% at 50% 8%, #2a1d5e 0%, #150f33 45%, #0b0820 100%);
    color:#eceaf6; font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Inter,sans-serif;
    display:grid; place-items:center; padding:24px; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .scene { display:flex; flex-direction:column; align-items:center; }
  .stage { position:relative; width:min(330px,84vw); aspect-ratio:1; }
  .stage > * { position:absolute; inset:0; }
  svg.bg, canvas.fx { width:100%; height:100%; }
  canvas.fx { pointer-events:none; }
  .flash { background:radial-gradient(circle at 50% 47%, rgba(255,255,255,.9), transparent 45%); opacity:0; }
  .badge {
    position:absolute; left:50%; top:50%; width:46%; height:46%; margin:-23% 0 0 -23%;
    will-change:transform; filter:drop-shadow(0 14px 30px rgba(120,60,200,.4));
  }
  .badge svg { width:100%; height:100%; display:block; overflow:visible; }
  .text { text-align:center; margin-top:-6px; }
  .kicker { font-size:13px; font-weight:700; letter-spacing:.32em; text-transform:uppercase; color:#ffcf6b; }
  .title { font-size:38px; font-weight:800; letter-spacing:-.02em; margin:6px 0 2px; }
  .sub { font-size:15px; color:#a39fc4; }
  .replay {
    margin-top:24px; background:rgba(255,255,255,.08); color:#eceaf6; border:1px solid rgba(255,255,255,.14);
    border-radius:999px; padding:11px 24px; font-size:14px; font-weight:600; cursor:pointer; transition:background .2s ease, transform .12s ease;
  }
  .replay:hover { background:rgba(255,255,255,.14); } .replay:active { transform:scale(.97); }
  .sound { position:fixed; bottom:18px; right:20px; background:none; border:0; cursor:pointer; color:#6a6590; font-size:12px; padding:8px; transition:color .2s ease; }
  .sound.on { color:#a39fc4; }
</style>
</head>
<body>
  <div class="scene">
    <div class="stage" id="stage">
      <svg class="bg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <radialGradient id="glowG" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#ffd27a" stop-opacity=".55"/><stop offset="55%" stop-color="#ff9d54" stop-opacity=".18"/><stop offset="100%" stop-color="#ff9d54" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle id="glow" cx="200" cy="200" r="120" fill="url(#glowG)"/>
        <g id="rays"></g>
      </svg>

      <div class="badge" id="badge">
        <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="medal" x1="0" y1="0" x2="0.4" y2="1">
              <stop offset="0" stop-color="#ffe79c"/><stop offset="48%" stop-color="#f7c25a"/><stop offset="100%" stop-color="#e89327"/>
            </linearGradient>
            <linearGradient id="shineG" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity=".75"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/>
            </linearGradient>
            <clipPath id="hexClip"><polygon points="80,8 142,44 142,116 80,152 18,116 18,44"/></clipPath>
          </defs>
          <polygon points="80,4 146,42 146,118 80,156 14,118 14,42" fill="#c97e1a"/>
          <polygon points="80,8 142,44 142,116 80,152 18,116 18,44" fill="url(#medal)"/>
          <polygon points="80,20 131,50 131,110 80,140 29,110 29,50" fill="none" stroke="#fff" stroke-opacity=".45" stroke-width="2.5"/>
          <path d="M80 46 l9.2 19.3 21.3 3 -15.4 15 3.6 21.2 -18.7-9.9 -18.7 9.9 3.6-21.2 -15.4-15 21.3-3z" fill="#fff" fill-opacity=".96"/>
          <g clip-path="url(#hexClip)"><rect id="shine" x="-50" y="-20" width="42" height="200" fill="url(#shineG)" transform="rotate(18 80 80)"/></g>
        </svg>
      </div>

      <div class="flash" id="flash"></div>
      <canvas class="fx" id="fx"></canvas>
    </div>

    <div class="text">
      <div class="kicker">Achievement Unlocked</div>
      <div class="title">Curator</div>
      <div class="sub">You saved your 100th card</div>
    </div>
    <button class="replay" id="replay">Replay</button>
  </div>
  <button class="sound on" id="sound" aria-label="Toggle sound">♪ sound</button>

<script>
  const ns = 'http://www.w3.org/2000/svg';
  const raysG = document.getElementById('rays');
  for (let i=0;i<16;i++){
    const long = i%2===0, len = long?192:150, bw=12, r0=92;
    const p=document.createElementNS(ns,'polygon');
    p.setAttribute('points', `200,${200-len} ${200-bw},${200-r0} ${200+bw},${200-r0}`);
    p.setAttribute('transform', `rotate(${i*22.5} 200 200)`);
    p.setAttribute('fill', long?'#ffd98a':'#ffb27a');
    p.setAttribute('opacity', long?0.5:0.32);
    raysG.appendChild(p);
  }

  // ---------- confetti / sparkle canvas ----------
  const cv = document.getElementById('fx'), cx = cv.getContext('2d'), stage = document.getElementById('stage');
  let DPR=1, CW=0, CH=0;
  function sizeFx(){ const r=stage.getBoundingClientRect(); DPR=Math.min(devicePixelRatio||1,2); CW=r.width; CH=r.height; cv.width=CW*DPR; cv.height=CH*DPR; cx.setTransform(DPR,0,0,DPR,0,0); }
  sizeFx(); addEventListener('resize', sizeFx);
  const parts=[]; const COLORS=['#ffd24a','#ff7ab8','#9b8bff','#5ee0b0','#ff9f4a','#6cc6ff'];
  function burst(){
    const ox=CW*0.5, oy=CH*0.47;
    for(let i=0;i<150;i++){ const a=Math.random()*Math.PI*2, sp=120+Math.random()*360;
      parts.push({t:'c',x:ox,y:oy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-120,life:0,max:1.1+Math.random()*.9,rot:Math.random()*6,vr:(Math.random()-.5)*12,w:5+Math.random()*5,h:8+Math.random()*7,c:COLORS[i%COLORS.length]}); }
    for(let i=0;i<26;i++){ const a=Math.random()*Math.PI*2, sp=60+Math.random()*220;
      parts.push({t:'s',x:ox,y:oy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0,max:.7+Math.random()*.4,size:2+Math.random()*2.5}); }
  }
  let lastFx=0;
  function fxLoop(now){
    const dt=lastFx?Math.min((now-lastFx)/1000,1/30):1/60; lastFx=now;
    cx.clearRect(0,0,CW,CH);
    for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.life+=dt; if(p.life>=p.max){parts.splice(i,1);continue;}
      if(p.t==='c'){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=520*dt; p.vx*=.99; p.rot+=p.vr*dt; cx.globalAlpha=Math.min(1,(p.max-p.life)*2.2); cx.fillStyle=p.c; cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot); cx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cx.restore(); }
      else { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=.94; p.vy*=.94; cx.globalAlpha=1-p.life/p.max; cx.fillStyle='#fff7d6'; cx.beginPath(); cx.arc(p.x,p.y,p.size,0,7); cx.fill(); }
    }
    cx.globalAlpha=1; requestAnimationFrame(fxLoop);
  }
  requestAnimationFrame(fxLoop);

  // ---------- audio ----------
  let actx, soundOn=true;
  const ensure=()=>{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); };
  function whoosh(){ if(!soundOn) return; ensure(); const t=actx.currentTime, len=Math.floor(actx.sampleRate*.5), b=actx.createBuffer(1,len,actx.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1); const s=actx.createBufferSource(); s.buffer=b;
    const f=actx.createBiquadFilter(); f.type='bandpass'; f.frequency.setValueAtTime(300,t); f.frequency.exponentialRampToValueAtTime(3500,t+.4); f.Q.value=.8;
    const g=actx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(.12,t+.12); g.gain.exponentialRampToValueAtTime(0.0001,t+.5);
    s.connect(f); f.connect(g); g.connect(actx.destination); s.start(t); s.stop(t+.5); }
  function chime(){ if(!soundOn) return; ensure(); const t=actx.currentTime, notes=[523.25,659.25,783.99,1046.5,1318.5];
    notes.forEach((fr,i)=>{ const o=actx.createOscillator(),g=actx.createGain(),o2=actx.createOscillator(); o.type='triangle'; o2.type='sine'; o.frequency.value=fr; o2.frequency.value=fr*2;
      const ts=t+i*0.085; g.gain.setValueAtTime(0.0001,ts); g.gain.exponentialRampToValueAtTime(.18,ts+.02); g.gain.exponentialRampToValueAtTime(0.0001,ts+.6);
      o.connect(g); o2.connect(g); g.connect(actx.destination); o.start(ts); o.stop(ts+.65); o2.start(ts); o2.stop(ts+.65); }); }
  const soundBtn=document.getElementById('sound');
  soundBtn.addEventListener('click', ()=>{ soundOn=!soundOn; soundBtn.classList.toggle('on',soundOn); if(soundOn){ensure();chime();} });

  // ---------- choreography ----------
  let idle=[];
  function killIdle(){ idle.forEach(t=>t.kill()); idle=[]; }
  function startIdle(){
    idle.push(gsap.to('#rays',{rotation:360,duration:46,ease:'none',repeat:-1,svgOrigin:'200 200'}));
    idle.push(gsap.to('#badge',{y:'-=9',duration:2.4,ease:'sine.inOut',repeat:-1,yoyo:true}));
    idle.push(gsap.to('#glow',{scale:1.08,opacity:.85,duration:2.6,ease:'sine.inOut',repeat:-1,yoyo:true,svgOrigin:'200 200'}));
    idle.push(gsap.fromTo('#shine',{x:-50},{x:200,duration:.85,ease:'power1.inOut',repeat:-1,repeatDelay:3.6}));
  }
  function reveal(){
    killIdle(); ensure();
    gsap.set('#badge',{scale:0, rotationY:-150, y:0, opacity:0, transformPerspective:700, transformOrigin:'50% 50%'});
    gsap.set('#rays',{scale:0, opacity:0, svgOrigin:'200 200'});
    gsap.set('#glow',{opacity:0, scale:.55, svgOrigin:'200 200'});
    gsap.set('#shine',{x:-50});
    gsap.set('.text > *',{y:20, opacity:0});

    const tl = gsap.timeline(); window.__tl = tl;
    tl.to('#flash',{opacity:.9,duration:.09},0)
      .to('#flash',{opacity:0,duration:.45},'>-.02')
      .to('#glow',{opacity:1,scale:1,duration:.6,ease:'power2.out'},0.02)
      .to('#rays',{opacity:.85,scale:1,duration:.7,ease:'back.out(1.5)'},0.05)
      .add(()=>{ whoosh(); }, 0.05)
      .to('#badge',{scale:1,rotationY:0,opacity:1,duration:.95,ease:'back.out(1.5)'},0.12)
      .add(()=>{ burst(); }, 0.32)
      .add(()=>{ chime(); }, 0.40)
      .to('#shine',{x:200,duration:.7,ease:'power1.inOut'},'-=.35')
      .to('.text > *',{y:0,opacity:1,duration:.55,stagger:.1,ease:'power3.out'},'-=.35')
      .add(startIdle);
  }
  document.getElementById('replay').addEventListener('click', reveal);
  // autoplay once shortly after load
  gsap.delayedCall(0.5, reveal);
</script>
</body>
</html>
