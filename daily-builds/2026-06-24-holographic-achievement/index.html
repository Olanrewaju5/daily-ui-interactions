<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#f2efe9" />
<title>Achievement Unlocked — Holographic · Day 12</title>
<style>
  * { box-sizing:border-box; }
  html, body { height:100%; margin:0; }
  body {
    background:radial-gradient(120% 100% at 50% 0%, #fbfaf7 0%, #efece5 60%, #e7e3da 100%);
    color:#1f1d1a; font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Inter,sans-serif;
    display:grid; place-items:center; padding:24px; -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  .scene { display:flex; flex-direction:column; align-items:center; gap:26px; }
  .stage { perspective:1000px; width:clamp(260px,78vw,320px); }

  .drop { transform-style:preserve-3d; will-change:transform; }
  .drop.in { animation:drop 1.05s cubic-bezier(.5,1.2,.4,1) both; }
  @keyframes drop {
    0%   { transform:translateY(-150%) rotateZ(-16deg) scale(.82); opacity:0; }
    55%  { transform:translateY(4%)   rotateZ(4deg)  scale(1.02); opacity:1; }
    72%  { transform:translateY(-2.5%) rotateZ(-2deg) scale(1); }
    86%  { transform:translateY(1%)   rotateZ(1deg); }
    100% { transform:translateY(0)    rotateZ(0)   scale(1); opacity:1; }
  }

  .tilt {
    position:relative; aspect-ratio:5/7; border-radius:22px; transform-style:preserve-3d; will-change:transform;
    background:linear-gradient(160deg,#eef0f6 0%,#d7dbe8 48%,#c4c9db 100%);
    box-shadow:0 30px 60px -24px rgba(60,50,90,.45), 0 0 0 1px rgba(255,255,255,.7) inset, 0 2px 3px rgba(255,255,255,.9) inset;
    overflow:hidden; cursor:pointer;
  }
  /* holographic foil */
  .tilt::before{
    content:""; position:absolute; inset:0; border-radius:inherit; z-index:1; pointer-events:none;
    background:repeating-linear-gradient(110deg,
      hsla(0,100%,72%,.55) 0%, hsla(52,100%,72%,.55) 10%, hsla(120,90%,70%,.55) 20%,
      hsla(190,100%,70%,.55) 30%, hsla(255,100%,76%,.55) 40%, hsla(320,100%,74%,.55) 50%, hsla(0,100%,72%,.55) 60%);
    background-size:280% 280%;
    background-position:var(--fx,50%) var(--fy,50%);
    mix-blend-mode:color-dodge; opacity:var(--fop,.42);
  }
  /* moving glare */
  .tilt::after{
    content:""; position:absolute; inset:0; border-radius:inherit; z-index:3; pointer-events:none;
    background:radial-gradient(circle at var(--mx,50%) var(--my,30%), rgba(255,255,255,.9), rgba(255,255,255,0) 42%);
    mix-blend-mode:soft-light;
  }
  .content {
    position:relative; z-index:2; height:100%; padding:26px 22px 20px;
    display:flex; flex-direction:column; align-items:center; text-align:center;
  }
  .badge {
    width:78px; height:78px; border-radius:50%; margin-top:8px; display:grid; place-items:center;
    background:conic-gradient(from 140deg,#ffd76b,#ff8ac2,#8ab4ff,#7df0c0,#ffd76b);
    box-shadow:0 6px 16px rgba(120,90,180,.3), 0 0 0 4px rgba(255,255,255,.85);
  }
  .badge svg { width:40px; height:40px; filter:drop-shadow(0 1px 1px rgba(0,0,0,.15)); }
  .kick { margin-top:18px; font-size:11px; font-weight:700; letter-spacing:.24em; text-transform:uppercase; color:#8a86d6; }
  .name { font-size:30px; font-weight:800; letter-spacing:-.02em; margin:6px 0 0; }
  .sub  { font-size:13px; color:#6f6b64; margin:6px 0 0; }
  .spacer { flex:1; }
  .brand { font-size:12px; font-weight:700; letter-spacing:.04em; color:#a7a29a; }
  .brand b { color:#4a4640; }

  .sparkle { position:absolute; z-index:4; pointer-events:none; color:#fff; filter:drop-shadow(0 0 4px rgba(255,255,255,.9)); opacity:0; }
  .drop.in .sparkle { animation:tw 2.4s ease-in-out infinite; }
  .sparkle:nth-child(1){ top:14%; left:16%; animation-delay:.6s; }
  .sparkle:nth-child(2){ top:30%; right:14%; animation-delay:1.2s; }
  .sparkle:nth-child(3){ bottom:22%; left:22%; animation-delay:1.8s; }
  @keyframes tw { 0%,100%{opacity:0; transform:scale(.4)} 50%{opacity:.9; transform:scale(1)} }

  .replay {
    background:#1f1d1a; color:#faf8f4; border:0; border-radius:999px; padding:12px 26px; font-size:14px; font-weight:600; cursor:pointer;
    transition:transform .14s ease, background .2s ease; box-shadow:0 10px 22px -10px rgba(31,29,26,.6);
  }
  .replay:hover { background:#000; transform:translateY(-2px); } .replay:active { transform:translateY(0) scale(.97); }
  .hint { font-size:12px; color:#a7a29a; margin-top:-12px; }
  .sound { position:fixed; bottom:18px; right:20px; background:none; border:0; cursor:pointer; color:#bdb8ad; font-size:12px; padding:8px; }
  .sound.on { color:#8a857a; }
</style>
</head>
<body>
  <div class="scene">
    <div class="stage">
      <div class="drop" id="drop">
        <div class="tilt" id="tilt">
          <div class="content">
            <div class="badge">
              <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M20 4l4.6 9.4 10.4 1.5-7.5 7.3 1.8 10.3L20 27.4l-9.3 4.9 1.8-10.3-7.5-7.3 10.4-1.5z" fill="#fff"/></svg>
            </div>
            <div class="kick">Achievement Unlocked</div>
            <div class="name">Curator</div>
            <div class="sub">You saved your 100th card</div>
            <div class="spacer"></div>
            <div class="brand">my<b>Mind</b></div>
          </div>
          <div class="sparkle" style="font-size:16px">✦</div>
          <div class="sparkle" style="font-size:12px">✦</div>
          <div class="sparkle" style="font-size:14px">✦</div>
        </div>
      </div>
    </div>
    <div class="hint">tilt the card with your cursor</div>
    <button class="replay" id="replay">Replay</button>
  </div>
  <button class="sound on" id="sound" aria-label="Toggle sound">♪ sound</button>

<script>
  const drop = document.getElementById('drop'), tilt = document.getElementById('tilt');

  // ---------- audio ----------
  let actx, soundOn=true;
  const ensure=()=>{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); };
  function pop(){ if(!soundOn) return; ensure(); const t=actx.currentTime;
    const o=actx.createOscillator(),g=actx.createGain(); o.type='sine'; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(760,t+.12);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(.28,t+.02); g.gain.exponentialRampToValueAtTime(0.0001,t+.3);
    o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+.32); }
  function shimmer(){ if(!soundOn) return; ensure(); const t=actx.currentTime, notes=[1046.5,1318.5,1568,2093];
    notes.forEach((f,i)=>{ const o=actx.createOscillator(),g=actx.createGain(); o.type='triangle'; o.frequency.value=f; const ts=t+.12+i*0.06;
      g.gain.setValueAtTime(0.0001,ts); g.gain.exponentialRampToValueAtTime(.12,ts+.02); g.gain.exponentialRampToValueAtTime(0.0001,ts+.5); o.connect(g); g.connect(actx.destination); o.start(ts); o.stop(ts+.55); }); }
  const soundBtn=document.getElementById('sound');
  soundBtn.addEventListener('click',()=>{ soundOn=!soundOn; soundBtn.classList.toggle('on',soundOn); if(soundOn){ ensure(); shimmer(); } });

  // ---------- tilt + holographic ----------
  let active=false, lastMove=0;
  let trx=0, try_=0, crx=0, cry=0;        // target/current tilt
  let gx=50, gy=30, cgx=50, cgy=30;       // glare pos
  const MAX=14;
  function onMove(e){ active=true; lastMove=performance.now();
    const r=tilt.getBoundingClientRect(); const px=(e.clientX-r.left)/r.width, py=(e.clientY-r.top)/r.height;
    try_ = (px-0.5)*2*MAX; trx = -(py-0.5)*2*MAX; gx=px*100; gy=py*100;
    if(soundOn) ensure();
  }
  tilt.addEventListener('pointermove', onMove);
  tilt.addEventListener('pointerleave', ()=>{ active=false; });

  function frame(now){
    if(active && now-lastMove>1300) active=false;
    if(!active){ const t=now/1000; try_=Math.sin(t*0.7)*8; trx=Math.cos(t*0.55)*5; gx=50+Math.sin(t*0.7)*22; gy=32+Math.cos(t*0.55)*14; }
    crx+=(trx-crx)*0.09; cry+=(try_-cry)*0.09; cgx+=(gx-cgx)*0.12; cgy+=(gy-cgy)*0.12;
    tilt.style.transform=`rotateX(${crx.toFixed(2)}deg) rotateY(${cry.toFixed(2)}deg)`;
    tilt.style.setProperty('--fx', (50 - cry*2.4).toFixed(1)+'%');
    tilt.style.setProperty('--fy', (50 + crx*2.4).toFixed(1)+'%');
    tilt.style.setProperty('--fop', (0.36 + Math.min(0.34,(Math.abs(crx)+Math.abs(cry))/42)).toFixed(3));
    tilt.style.setProperty('--mx', cgx.toFixed(1)+'%');
    tilt.style.setProperty('--my', cgy.toFixed(1)+'%');
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---------- entrance ----------
  function play(){ drop.classList.remove('in'); void drop.offsetWidth; drop.classList.add('in'); ensure(); setTimeout(()=>{ pop(); shimmer(); }, 430); }
  document.getElementById('replay').addEventListener('click', play);
  window.__play = play;
  play();
</script>
</body>
</html>
