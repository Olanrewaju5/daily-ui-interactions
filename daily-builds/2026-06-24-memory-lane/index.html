<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#d8d5cd" />
<title>Memory Lane — Timeline Slider · Day 16</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,300..500;1,6..72,300..400&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  html, body { height:100%; margin:0; }
  body {
    background:#d8d5cd; color:#211f1c;
    font-family:"Newsreader",Georgia,serif;
    display:grid; place-items:center; padding:20px; -webkit-font-smoothing:antialiased;
  }

  .app {
    position:relative; width:min(1180px,96vw); aspect-ratio:16/10; min-height:480px;
    background:#f1efea; border-radius:22px; overflow:hidden;
    box-shadow:0 50px 90px -40px rgba(40,35,25,.55), 0 0 0 1px rgba(0,0,0,.05);
    display:flex; flex-direction:column;
  }

  /* header */
  .bar { display:flex; align-items:center; justify-content:space-between; padding:20px 26px; flex:none; z-index:5; }
  .logo { width:30px; height:26px; }
  .right { display:flex; align-items:center; gap:12px; }
  .share { background:#fff; border:0; border-radius:999px; padding:8px 16px; font:600 13px/1 "Newsreader",serif; cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,.10); transition:transform .14s ease; }
  .share:hover { transform:translateY(-1px); } .share:active { transform:translateY(0) scale(.97); }
  .avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(170deg,#9db6cf 0%,#c8b79b 55%,#e6b263 100%); box-shadow:0 2px 6px rgba(0,0,0,.15); }

  /* slider */
  .viewport { position:relative; flex:1; overflow:hidden; cursor:grab; touch-action:pan-y; }
  .viewport.grabbing { cursor:grabbing; }
  .track { position:absolute; inset:0; display:flex; align-items:center; will-change:transform; }
  .slide { flex:0 0 var(--sw,86%); height:100%; display:grid; grid-template-columns:40% 60%; align-items:center; padding:0 clamp(18px,3vw,44px); gap:2%; will-change:transform,opacity; }

  .copy h2 { font-family:"Instrument Serif",serif; font-weight:400; font-size:clamp(24px,3.1vw,40px); line-height:1.05; margin:0 0 .18em; letter-spacing:-.01em; }
  .copy p { font-size:clamp(15px,1.85vw,25px); line-height:1.35; color:#5d574e; margin:0; font-weight:300; max-width:14em; }

  .cluster { position:relative; height:78%; --px:0; --py:0; }
  .ph { position:absolute; background:#fff; padding:3.2% 3.2% 4.6%; border-radius:7px;
    box-shadow:0 22px 44px -14px rgba(35,28,18,.42), 0 2px 6px rgba(0,0,0,.10);
    transition:transform .3s cubic-bezier(.2,.8,.3,1); }
  .ph img { display:block; width:100%; height:100%; object-fit:cover; border-radius:2px; background:linear-gradient(160deg,#c9c2b6,#8f8a7e); }
  .ph.a { width:44%; aspect-ratio:4/3; left:-1%;  top:30%; --d:14px; transform:translate(calc(var(--px)*var(--d)),calc(var(--py)*var(--d))) rotate(-5deg); z-index:1; }
  .ph.b { width:33%; aspect-ratio:3/4; left:36%; top:4%;  --d:26px; transform:translate(calc(var(--px)*var(--d)),calc(var(--py)*var(--d))) rotate(1.5deg); z-index:3; }
  .ph.c { width:35%; aspect-ratio:3/4; left:61%; top:17%; --d:20px; transform:translate(calc(var(--px)*var(--d)),calc(var(--py)*var(--d))) rotate(8.5deg); z-index:2; }

  .note { position:absolute; left:11%; top:-13%; z-index:4; pointer-events:none; opacity:0; transform:translateY(6px); transition:opacity .45s ease .15s, transform .45s ease .15s; }
  .slide.active .note { opacity:1; transform:translateY(0); }
  .note span { font-family:"Caveat",cursive; font-size:clamp(14px,1.55vw,21px); line-height:1.05; display:block; max-width:8em; color:#211f1c; }
  .note svg { display:block; width:clamp(44px,4.6vw,64px); height:auto; margin-left:14%; margin-top:2px; overflow:visible; }
  .note path { stroke:#211f1c; stroke-width:1.6; fill:none; stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray:var(--len,120); stroke-dashoffset:var(--len,120); transition:stroke-dashoffset .7s ease .3s; }
  .slide.active .note path { stroke-dashoffset:0; }

  /* caption + filmstrip */
  .foot { flex:none; padding:0 0 22px; text-align:center; z-index:5; }
  .cap { transition:opacity .22s ease; }
  .cap .t { font-family:"Instrument Serif",serif; font-size:17px; }
  .cap .p { font-family:"Newsreader",serif; font-style:italic; font-size:15px; color:#4d473f; margin-top:1px; }
  .tick { width:1px; height:11px; background:#3a352d; margin:7px auto 9px; opacity:.6; }
  .strip { position:relative; width:min(430px,68%); margin:0 auto; height:56px; overflow:hidden; cursor:grab; touch-action:pan-y;
    -webkit-mask-image:linear-gradient(90deg,transparent 0,#000 13%,#000 87%,transparent 100%);
    mask-image:linear-gradient(90deg,transparent 0,#000 13%,#000 87%,transparent 100%); }
  .strip.grabbing { cursor:grabbing; }
  .striptrack { position:absolute; left:0; top:0; height:100%; display:flex; align-items:center; gap:5px; will-change:transform; }
  .thumb { position:relative; flex:none; width:46px; height:34px; border-radius:3px; overflow:hidden; background:#c9c2b6;
    box-shadow:0 3px 8px rgba(0,0,0,.18); will-change:transform,opacity; transform-origin:center center; }
  .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  .thumb::after { content:""; position:absolute; inset:0; border-radius:3px; box-shadow:inset 0 0 0 0 #211f1c; transition:box-shadow .2s ease; }
  .thumb.on::after { box-shadow:inset 0 0 0 2px #211f1c; }

  .hint { position:absolute; left:50%; bottom:8px; transform:translateX(-50%); font-size:11px; color:#9b9488; letter-spacing:.08em; z-index:5; }

  @media (max-width:760px){
    .app { aspect-ratio:auto; height:min(88vh,720px); }
    .slide { grid-template-columns:1fr; grid-template-rows:auto 1fr; gap:6px; align-content:center; }
    .copy p { max-width:none; }
    .cluster { height:56%; }
  }
</style>
</head>
<body>
  <div class="app" id="app">
    <div class="bar">
      <svg class="logo" viewBox="0 0 30 26" fill="none" aria-label="Memory Lane">
        <path d="M4 17.5 L9.5 6 L15 17.5 Z" stroke="#e8912f" stroke-width="2" stroke-linejoin="round"/>
        <rect x="12.5" y="9" width="9" height="9" rx="2" stroke="#e8912f" stroke-width="2" transform="rotate(-12 17 13.5)"/>
        <circle cx="23" cy="17" r="4" stroke="#e8912f" stroke-width="2"/>
      </svg>
      <div class="right">
        <button class="share" id="share">Share</button>
        <div class="avatar"></div>
      </div>
    </div>

    <div class="viewport" id="viewport">
      <div class="track" id="track"></div>
    </div>

    <div class="foot">
      <div class="cap" id="cap"><div class="t" id="capT">Boat tour</div><div class="p" id="capP">Vancouver</div></div>
      <div class="tick"></div>
      <div class="strip" id="strip"><div class="striptrack" id="striptrack"></div></div>
    </div>
    <div class="hint">drag the photos or the timeline · ← →</div>
  </div>

<script>
  const MEM = [
    { t:'Boat tour',   p:'Vancouver',  h:'A day in Whistler.',        b:'Canada offers stunning views of rugged mountains, turquoise lakes, lush forests, and abundant wildlife encounters.', note:'walking\ninto town', s:[1015,1036,1043] },
    { t:'Golden hour', p:'Tofino',     h:'Where the pines meet the sea.', b:'We drove until the road ran out, then sat on the sand until the light went soft and the cold set in.', note:'first swim', s:[1016,1039,1050] },
    { t:'Trailhead',   p:'Banff',      h:'Morning on the lake.',      b:'Still water, no wind, and a canoe that we probably rented for far too long. Worth every minute.', note:'so cold!', s:[1018,1037,1044] },
    { t:'Night market',p:'Richmond',   h:'Lanterns after dark.',      b:'Steam, neon, and a queue that wrapped the block. We ate standing up and did not mind at all.', note:'best noodles', s:[1024,1040,1052] },
    { t:'Cabin days',  p:'Squamish',   h:'Slow mornings, tall trees.',b:'Coffee outside, a borrowed sweater, and absolutely nowhere to be for three whole days.', note:'coffee outside', s:[1025,1041,1055] },
    { t:'Last light',  p:'Kits Beach', h:'The long way home.',        b:'The end of summer arrived quietly, somewhere between the ferry and the last of the sun.', note:'goodbye summer', s:[1027,1042,1056] },
  ];
  const img = (seed,w,h)=>`https://picsum.photos/seed/ml${seed}/${w}/${h}`;
  const ARROW = 'M3 5 C 26 1, 48 14, 55 44';
  const HEAD  = 'M46 36 L56 46 L44 47';

  const track=document.getElementById('track'), strip=document.getElementById('strip'), striptrack=document.getElementById('striptrack'), viewport=document.getElementById('viewport');
  MEM.forEach((m,i)=>{
    const el=document.createElement('article'); el.className='slide';
    el.innerHTML=`
      <div class="copy"><h2>${m.h}</h2><p>${m.b}</p></div>
      <div class="cluster">
        <figure class="ph a"><img alt="" src="${img(m.s[0],800,600)}"></figure>
        <figure class="ph b"><img alt="" src="${img(m.s[1],600,800)}"></figure>
        <figure class="ph c"><img alt="" src="${img(m.s[2],600,800)}"></figure>
        <div class="note"><span>${m.note.replace(/\n/g,'<br>')}</span>
          <svg viewBox="0 0 60 50"><path d="${ARROW}"/><path d="${HEAD}"/></svg></div>
      </div>`;
    track.appendChild(el);
    const th=document.createElement('button'); th.className='thumb'; th.setAttribute('aria-label',m.t);
    th.innerHTML=`<img alt="" src="${img(m.s[1],120,90)}">`;
    th.addEventListener('click',()=>{ target=i; });
    striptrack.appendChild(th);
  });
  const slides=[...track.children], thumbs=[...striptrack.children];
  // dash lengths for the hand-drawn arrows
  slides.forEach(s=>s.querySelectorAll('.note path').forEach(p=>{ const L=p.getTotalLength(); p.style.setProperty('--len',L.toFixed(1)); }));

  // ---------- geometry ----------
  let step=0, offset=0, tStep=51, tOffset=0;
  function measure(){ const s=slides[0].getBoundingClientRect(); const vw=viewport.clientWidth; step=s.width; offset=(vw-s.width)/2;
    tStep = (thumbs[1]?.offsetLeft - thumbs[0]?.offsetLeft) || 51;
    tOffset = strip.clientWidth/2 - thumbs[0].offsetWidth/2;
  }
  measure(); addEventListener('resize', measure);
  addEventListener('load', measure);

  // ---------- state ----------
  let index=0, target=0, vel=0, dragging=false, last=0;
  const clamp=(n,a,b)=>Math.min(Math.max(n,a),b);

  // drag on the photo area
  let sx=0, si=0, lastX=0, lastT=0, vx=0, source=null;
  function down(e, src, unit){ dragging=true; source={src,unit}; sx=e.clientX; si=index; vel=0; vx=0; lastX=e.clientX; lastT=performance.now();
    (src===viewport?viewport:strip).classList.add('grabbing'); src.setPointerCapture?.(e.pointerId); }
  function move(e){ if(!dragging) return; const now=performance.now(), dt=(now-lastT)/1000;
    if(dt>0){ vx=(e.clientX-lastX)/dt; lastX=e.clientX; lastT=now; }
    index = clamp(si - (e.clientX-sx)/source.unit, -0.6, MEM.length-0.4);
  }
  function up(){ if(!dragging) return; dragging=false;
    viewport.classList.remove('grabbing'); strip.classList.remove('grabbing');
    const projected = index - (vx/source.unit)*0.28;
    target = clamp(Math.round(projected), 0, MEM.length-1); source=null;
  }
  viewport.addEventListener('pointerdown', e=>{ e.preventDefault(); down(e, viewport, step); });
  strip.addEventListener('pointerdown',  e=>{ down(e, strip, tStep); });
  addEventListener('pointermove', move); addEventListener('pointerup', up); addEventListener('pointercancel', up);
  addEventListener('keydown', e=>{ if(e.key==='ArrowRight') target=clamp(target+1,0,MEM.length-1);
    if(e.key==='ArrowLeft') target=clamp(target-1,0,MEM.length-1); });

  // photo parallax
  slides.forEach(s=>{ const c=s.querySelector('.cluster');
    s.addEventListener('pointermove', e=>{ if(dragging) return; const r=c.getBoundingClientRect();
      c.style.setProperty('--px', clamp((e.clientX-r.left)/r.width*2-1,-1,1).toFixed(3));
      c.style.setProperty('--py', clamp((e.clientY-r.top)/r.height*2-1,-1,1).toFixed(3)); });
    s.addEventListener('pointerleave', ()=>{ c.style.setProperty('--px',0); c.style.setProperty('--py',0); });
  });

  // caption
  const cap=document.getElementById('cap'), capT=document.getElementById('capT'), capP=document.getElementById('capP');
  let shown=-1;
  function setCap(i){ if(i===shown) return; shown=i; cap.style.opacity=0;
    setTimeout(()=>{ capT.textContent=MEM[i].t; capP.textContent=MEM[i].p; cap.style.opacity=1; },140); }

  document.getElementById('share').addEventListener('click',()=>{ const b=document.getElementById('share'); b.textContent='Copied!'; setTimeout(()=>b.textContent='Share',1200); });

  // ---------- loop ----------
  function frame(now){
    const dt=Math.min(last?(now-last)/1000:1/60, 1/30); last=now;
    if(!dragging){ const f=-150*(index-target)-24*vel; vel+=f*dt; index+=vel*dt; }
    track.style.transform=`translate3d(${(offset - index*step).toFixed(2)}px,0,0)`;

    const cur=clamp(Math.round(index),0,MEM.length-1); setCap(cur);
    slides.forEach((s,i)=>{ const d=Math.abs(i-index);
      s.style.opacity = (1 - Math.min(1,d)*0.72).toFixed(3);
      s.style.transform = `scale(${(1 - Math.min(1,d)*0.05).toFixed(4)})`;
      s.classList.toggle('active', i===cur && d<0.35);
    });
    striptrack.style.transform=`translate3d(${(tOffset - index*tStep).toFixed(2)}px,0,0)`;
    thumbs.forEach((t,i)=>{ const d=Math.abs(i-index);
      const sc = 1 + Math.max(0,1-d*0.85)*0.62;
      t.style.transform=`scale(${sc.toFixed(3)}) translateY(${(-Math.max(0,1-d*0.85)*3).toFixed(2)}px)`;
      t.style.opacity=clamp(1-d*0.24,0.28,1).toFixed(3);
      t.style.zIndex=String(10-Math.round(d));
      t.classList.toggle('on', i===cur);
    });
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  window.__go=(i)=>{ target=i; };
</script>
</body>
</html>
