<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#07060c" />
<title>Metaball — Raymarched WebGL · Day 13</title>
<style>
  * { box-sizing:border-box; }
  html, body { height:100%; margin:0; }
  body {
    background:#07060c; color:#e8eaf0;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Inter,sans-serif;
    display:grid; place-items:center; padding:24px; -webkit-font-smoothing:antialiased;
  }
  .scene { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .frame {
    position:relative; width:clamp(300px,90vw,540px); aspect-ratio:1/1; border-radius:26px; overflow:hidden;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.85), 0 0 0 1px rgba(255,255,255,.06); cursor:crosshair; touch-action:none;
  }
  .frame canvas { display:block; width:100%; height:100%; }
  .frame .kick { position:absolute; left:20px; top:16px; font-size:11px; letter-spacing:.28em; text-transform:uppercase; color:rgba(255,255,255,.7); pointer-events:none; }
  .frame .label { position:absolute; left:20px; bottom:18px; font-size:13px; font-weight:600; color:rgba(255,255,255,.82); text-shadow:0 1px 8px rgba(0,0,0,.6); pointer-events:none; }
  .caption { font-size:13px; color:#7f8696; }
  .sound { position:fixed; bottom:18px; right:20px; background:none; border:0; cursor:pointer; color:#5b606c; font-size:12px; padding:8px; }
  .sound.on { color:#8a8a90; }
  .err { position:absolute; inset:0; display:none; place-items:center; padding:24px; color:#ff8a8a; font:12px ui-monospace,monospace; white-space:pre-wrap; text-align:center; }
</style>
</head>
<body>
  <div class="scene">
    <div class="frame" id="frame">
      <canvas id="gl"></canvas>
      <div class="kick">Day 13 · Raymarching</div>
      <div class="label">Move your cursor to shape the blob</div>
      <div class="err" id="err"></div>
    </div>
    <div class="caption">A signed-distance field raymarched per pixel on the GPU — no meshes, pure math</div>
  </div>
  <button class="sound on" id="sound" aria-label="Toggle sound">♪ sound</button>

<script id="vs" type="x-shader/x-vertex">
attribute vec2 a_pos; void main(){ gl_Position=vec4(a_pos,0.0,1.0); }
</script>
<script id="fs" type="x-shader/x-fragment">
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform vec2 u_mouse;

mat2 rot(float a){ float c=cos(a), s=sin(a); return mat2(c,-s,s,c); }
float smin(float a,float b,float k){ float h=clamp(0.5+0.5*(b-a)/k,0.0,1.0); return mix(b,a,h)-k*h*(1.0-h); }
float sdSphere(vec3 p,float r){ return length(p)-r; }

float map(vec3 p){
  p.xz *= rot(u_time*0.22 + u_mouse.x*1.2);
  p.yz *= rot(-0.15 + u_mouse.y*0.7);
  float k=0.62;
  float d = sdSphere(p, 0.86);
  for(int i=0;i<4;i++){
    float fi=float(i);
    vec3 c = vec3(sin(u_time*0.7+fi*1.7)*1.05, cos(u_time*0.6+fi*2.3)*0.95, sin(u_time*0.5+fi*1.1)*1.05);
    d = smin(d, sdSphere(p-c, 0.5+0.12*sin(u_time+fi)), k);
  }
  vec3 mc = vec3(u_mouse.x*1.3, u_mouse.y*1.1, 0.85);
  d = smin(d, sdSphere(p-mc, 0.55), k);
  return d;
}
vec3 calcNormal(vec3 p){
  vec2 e=vec2(0.0016,0.0);
  return normalize(vec3(
    map(p+e.xyy)-map(p-e.xyy),
    map(p+e.yxy)-map(p-e.yxy),
    map(p+e.yyx)-map(p-e.yyx)));
}
vec3 pal(float t){ return 0.5+0.5*cos(6.28318*(vec3(1.0)*t+vec3(0.0,0.33,0.60))); }

void main(){
  vec2 uv=(gl_FragCoord.xy-0.5*u_res.xy)/u_res.y;
  vec3 ro=vec3(0.0,0.0,4.2);
  vec3 rd=normalize(vec3(uv,-1.6));
  float t=0.0, dmin=1e9; bool hit=false; vec3 p=ro;
  for(int i=0;i<90;i++){
    p=ro+rd*t; float d=map(p);
    dmin=min(dmin,d);
    if(d<0.001){ hit=true; break; }
    t+=d; if(t>12.0) break;
  }
  vec3 col;
  if(hit){
    vec3 n=calcNormal(p); vec3 v=-rd;
    float fres=pow(1.0-max(dot(n,v),0.0),3.0);
    vec3 l=normalize(vec3(0.7,0.9,0.55));
    float diff=max(dot(n,l),0.0);
    float diff2=max(dot(n,normalize(vec3(-0.6,-0.3,0.4))),0.0);
    float spec=pow(max(dot(reflect(-l,n),v),0.0),42.0);
    float idx=fres*1.1 + n.y*0.22 + length(p)*0.14;
    vec3 base=pal(idx);
    col = base*(0.18+0.75*diff) + base*0.25*diff2 + spec*vec3(1.0) + fres*pal(fres+0.3)*0.8;
  } else {
    col = mix(vec3(0.03,0.03,0.06), vec3(0.09,0.05,0.15), uv.y+0.5);
    float halo = exp(-max(dmin,0.0)*3.4);
    col += halo*vec3(0.55,0.32,0.85)*0.8;
  }
  col *= 1.0 - 0.24*dot(uv,uv);
  col = pow(max(col,0.0), vec3(0.85));
  gl_FragColor=vec4(col,1.0);
}
</script>

<script>
  const canvas=document.getElementById('gl'), frame=document.getElementById('frame'), errBox=document.getElementById('err');
  const gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');
  window.__shaderError=null;
  if(!gl){ errBox.style.display='grid'; errBox.textContent='WebGL not available'; }

  function compile(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ window.__shaderError=gl.getShaderInfoLog(s); console.error(window.__shaderError); } return s; }

  let uRes,uTime,uMouse,DPR=1;
  function init(){
    const vs=compile(gl.VERTEX_SHADER,document.getElementById('vs').textContent);
    const fs=compile(gl.FRAGMENT_SHADER,document.getElementById('fs').textContent);
    const prog=gl.createProgram(); gl.attachShader(prog,vs); gl.attachShader(prog,fs); gl.linkProgram(prog);
    if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){ window.__shaderError=(window.__shaderError||'')+' | link: '+gl.getProgramInfoLog(prog); }
    if(window.__shaderError){ errBox.style.display='grid'; errBox.textContent=window.__shaderError; return; }
    gl.useProgram(prog);
    const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
    const loc=gl.getAttribLocation(prog,'a_pos'); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
    uRes=gl.getUniformLocation(prog,'u_res'); uTime=gl.getUniformLocation(prog,'u_time'); uMouse=gl.getUniformLocation(prog,'u_mouse');
    { const r=frame.getBoundingClientRect(); if(r.width>0){ DPR=Math.min(devicePixelRatio||1,1.25); canvas.width=Math.round(r.width*DPR); canvas.height=Math.round(r.height*DPR); gl.viewport(0,0,canvas.width,canvas.height); } }
    requestAnimationFrame(loop);
  }

  const mouse={x:0,y:0}, sm={x:0,y:0}; let active=false, lastMove=0;
  function onMove(e){ const r=frame.getBoundingClientRect(); mouse.x=((e.clientX-r.left)/r.width)*2-1; mouse.y=-(((e.clientY-r.top)/r.height)*2-1); active=true; lastMove=performance.now(); ensure(); }
  frame.addEventListener('pointermove', onMove);
  frame.addEventListener('pointerdown', e=>{ ensure(); onMove(e); });

  // ambient pad
  let actx, soundOn=true, padGain, padFilter, started=false;
  const ensure=()=>{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); if(!started) startPad(); };
  function startPad(){ padGain=actx.createGain(); padGain.gain.value=0; padFilter=actx.createBiquadFilter(); padFilter.type='lowpass'; padFilter.frequency.value=500;
    [110,110*1.5,110*2.01].forEach(f=>{ const o=actx.createOscillator(); o.type='sine'; o.frequency.value=f; o.connect(padGain); o.start(); });
    padGain.connect(padFilter); padFilter.connect(actx.destination); started=true; }
  const soundBtn=document.getElementById('sound');
  soundBtn.addEventListener('click', ()=>{ soundOn=!soundOn; soundBtn.classList.toggle('on',soundOn); if(soundOn) ensure(); else if(padGain) padGain.gain.setTargetAtTime(0,actx.currentTime,0.2); });

  const start=performance.now();
  function loop(now){
    // self-heal size
    const r=frame.getBoundingClientRect();
    if(r.width>0){ DPR=Math.min(devicePixelRatio||1,1.25); const w=Math.round(r.width*DPR),h=Math.round(r.height*DPR);
      if(w!==canvas.width||h!==canvas.height){ canvas.width=w; canvas.height=h; gl.viewport(0,0,w,h); } }
    if(active && now-lastMove>1600) active=false;
    if(!active){ mouse.x*=0.96; mouse.y*=0.96; }   // drift back to center when idle
    sm.x+=(mouse.x-sm.x)*0.08; sm.y+=(mouse.y-sm.y)*0.08;
    const t=(now-start)/1000;
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, t);
    gl.uniform2f(uMouse, sm.x, sm.y);
    gl.drawArrays(gl.TRIANGLES,0,3);
    if(padGain && soundOn){ padGain.gain.setTargetAtTime(0.03, actx.currentTime, 0.4); padFilter.frequency.setTargetAtTime(360+ (sm.y*0.5+0.5)*900, actx.currentTime, 0.3); }
    requestAnimationFrame(loop);
  }

  window.__setMouse=(mx,my)=>{ mouse.x=sm.x=mx; mouse.y=sm.y=my; };
  if(gl) init();
</script>
</body>
</html>
